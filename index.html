<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tatu - Gestão Financeira Profissional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      (function() {
        try {
          const storedTheme = localStorage.getItem('theme');
          const supportDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          
          if (storedTheme === 'dark' || (!storedTheme && supportDark) || !storedTheme) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
              serif: ['Cormorant Garamond', 'serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              primary: { light: '#818cf8', DEFAULT: '#6366f1', dark: '#4f46e5' },
              secondary: { light: '#fb7185', DEFAULT: '#f43f5e', dark: '#e11d48' },
              accent: { light: '#fbbf24', DEFAULT: '#f59e0b', dark: '#d97706' },
              background: '#f8fafc',
              surface: '#FFFFFF',
              'surface-light': '#f1f5f9',
              'border-color': '#e2e8f0',
              'text-primary': '#0f172a',
              'text-secondary': '#475569',
              'text-muted': '#94a3b8',
              dark: {
                background: '#0a0a0c', // Fundo mais profundo para realçar cores
                surface: '#16161a',    // Superfície com leve tom azulado/cinza
                'surface-light': '#212127',
                'border-color': '#2d2d35',
                'text-primary': '#ffffff',
                'text-secondary': '#a1a1aa',
                'text-muted': '#71717a',
              },
              success: '#10b981',
              danger: '#f43f5e',
              warning: '#f59e0b',
            },
            boxShadow: {
              'glow-primary': '0 0 20px -5px rgba(99, 102, 241, 0.5)',
              'glow-success': '0 0 20px -5px rgba(16, 185, 129, 0.5)',
              'glow-danger': '0 0 20px -5px rgba(244, 63, 94, 0.5)',
            },
            borderRadius: { 
              '3xl': '1.5rem', 
              '4xl': '2rem',
              '5xl': '3rem'
            },
            animation: {
              'fade-in-up': 'fade-in-up 0.5s ease-out',
              'orb-glow': 'orb-glow 3s ease-in-out infinite',
              'orb-glow-listening': 'orb-glow-listening 1s ease-in-out infinite',
            },
            keyframes: {
              'fade-in-up': {
                '0%': { opacity: '0', transform: 'translateY(15px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'orb-glow': {
                '0%, 100%': { boxShadow: '0 0 20px rgba(99, 102, 241, 0.4)' },
                '50%': { boxShadow: '0 0 40px rgba(99, 102, 241, 0.7)' },
              },
              'orb-glow-listening': {
                '0%, 100%': { boxShadow: '0 0 30px rgba(16, 185, 129, 0.6)', transform: 'scale(1)' },
                '50%': { boxShadow: '0 0 60px rgba(16, 185, 129, 0.9)', transform: 'scale(1.1)' },
              },
            }
          },
        },
      };
    </script>
